plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4

Layout/LineLength:
  Max: 120

Metrics/MethodLength:
  Max: 20

Metrics/ClassLength:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - spec/**/*.rb
    - config/routes.rb

Style/Documentation:
  Enabled: false
